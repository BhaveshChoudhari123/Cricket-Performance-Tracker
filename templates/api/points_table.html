{% extends 'base.html' %}

{% block content %}

<h1>🏆 IPL Points Table</h1>

<table class="table table-dark">

    <thead>

        <tr>

            <th>Rank</th>

            <th>Team</th>

            <th>Matches</th>

            <th>Wins</th>

            <th>Losses</th>

            <th>Points</th>

            <th>NRR</th>

        </tr>

    </thead>

    <tbody>

        {% for team in teams %}

        <tr>

            <td>{{ forloop.counter }}</td>

            <td>{{ team.name }}</td>

            <td>{{ team.matches }}</td>

            <td>{{ team.wins }}</td>

            <td>{{ team.losses }}</td>

            <td>{{ team.points }}</td>

            <td>{{ team.nrr }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

<a href="/"
class="btn btn-primary">

🏠 Dashboard

</a>

{% endblock %}
