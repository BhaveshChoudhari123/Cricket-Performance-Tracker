{% extends 'base.html' %}

{% block content %}

<h1>🏆 Team Rankings</h1>

<hr>

<table class="table table-dark">

    <thead>

        <tr>

            <th>Rank</th>

            <th>Team</th>

            <th>Rating</th>

            <th>Points</th>

        </tr>

    </thead>

    <tbody>

        {% for team in teams %}

        <tr>

            <td>{{ forloop.counter }}</td>

            <td>{{ team.name }}</td>

            <td>{{ team.rating }}</td>

            <td>{{ team.points }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

<a
href="/"
class="btn btn-primary">

🏠 Dashboard

</a>

{% endblock %}
