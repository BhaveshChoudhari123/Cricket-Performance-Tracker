{% extends 'base.html' %}

{% block content %}

<h2>Players</h2>

<a
href="/players/add/"
class="btn btn-success mb-3">

Add Player

</a>

<table class="table table-dark">

    <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Age</th>
        <th>Team</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>

    {% for player in players %}

    <tr>

        <td>

            {% if player.player_image %}

                <img
                src="{{ player.player_image.url }}"
                width="80"
                height="80"
                style="object-fit:cover;border-radius:50%;">

            {% else %}

                No Image

            {% endif %}

        </td>

        <td>{{ player.name }}</td>
        <td>{{ player.age }}</td>
        <td>{{ player.team }}</td>
        <td>{{ player.role }}</td>

        <td>

            <a href="{% url 'edit_player' player.id %}"
               class="btn btn-warning btn-sm">
                Edit
            </a>

            <a href="{% url 'delete_player' player.id %}"
               class="btn btn-danger btn-sm">
                Delete
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
